<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Nimbus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 20px clamp(20px, 5vw, 64px);
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .error-code {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin: 0 0 16px;
    }
    .error-sub {
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 0 32px;
    }
  </style>
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="error-page">
    <p class="error-code">ERROR 404 · PAGE NOT FOUND</p>
    <h1 class="error-title">This cloud drifted off.</h1>
    <p class="error-sub">The page you're looking for doesn't exist or has moved. Let's get you back on course.</p>
    <a href="/" class="btn btn-primary">Return home</a>
  </div>
</body>
</html>
